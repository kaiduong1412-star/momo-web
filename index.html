<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMO ELITE - V2.0 FINAL FIX</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-black: #050505; --bg-card: #0f0f12;
            --neon-pink: #ff007f; --neon-orange: #ff8c00;
            --text-white: #ffffff; --text-gray: #888888;
        }

        body { background-color: var(--bg-black); color: var(--text-white); font-family: 'Inter', sans-serif; margin: 0; }

        /* AUTH SCREEN */
        .auth-container {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: radial-gradient(circle at 50% 50%, #1a0a0f 0%, #050505 100%);
        }
        .auth-card {
            background: var(--bg-card); padding: 30px; border-radius: 25px;
            border: 1px solid #222; width: 90%; max-width: 380px; text-align: center;
        }
        .auth-header { 
            font-weight: 900; background: linear-gradient(45deg, var(--neon-pink), var(--neon-orange)); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-size: 2rem; margin-bottom: 25px;
        }

        /* SIDEBAR & CONTENT */
        .sidebar { width: 250px; background: var(--bg-card); border-right: 1px solid #222; position: fixed; height: 100vh; padding: 20px; z-index: 100; }
        .content-area { margin-left: 250px; padding: 25px; min-height: 100vh; }
        
        .nav-link-custom { 
            color: var(--text-gray); padding: 12px; margin-bottom: 5px; border-radius: 10px; 
            display: block; text-decoration: none; cursor: pointer;
        }
        .nav-link-custom.active { color: white; background: rgba(255, 0, 127, 0.1); border-left: 3px solid var(--neon-pink); }

        /* MOBILE NAV */
        .mobile-nav { display: none; position: fixed; bottom: 0; width: 100%; background: #0f0f12; border-top: 1px solid #222; height: 65px; z-index: 1000; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .content-area { margin-left: 0; padding-bottom: 80px; }
            .mobile-nav { display: flex; justify-content: space-around; align-items: center; }
            .m-item { color: var(--text-gray); text-decoration: none; font-size: 11px; text-align: center; }
            .m-item.active { color: var(--neon-pink); }
            .m-item i { font-size: 18px; display: block; }
        }

        .card-custom { background: var(--bg-card); border-radius: 15px; border: 1px solid #222; padding: 20px; margin-bottom: 20px; }
        .btn-main { background: linear-gradient(45deg, var(--neon-pink), var(--neon-orange)); color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .lvl-bar-bg { height: 8px; background: #222; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .lvl-bar-fill { height: 100%; background: var(--neon-pink); width: 0%; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="authBox" class="auth-container">
        <div class="auth-card">
            <h1 class="auth-header">MMO ELITE</h1>
            
            <div id="loginForm">
                <input type="email" id="lEmail" class="form-control bg-dark border-0 text-white mb-3" placeholder="Email">
                <input type="password" id="lPass" class="form-control bg-dark border-0 text-white mb-3" placeholder="Mật khẩu">
                <button class="btn-main" onclick="doLogin()">ĐĂNG NHẬP</button>
                <p class="small mt-3 text-secondary">Chưa có nick? <span class="text-info" style="cursor:pointer" onclick="goReg(true)">Đăng ký</span></p>
            </div>

            <div id="regForm" style="display:none">
                <input type="text" id="rName" class="form-control bg-dark border-0 text-white mb-3" placeholder="Họ tên">
                <input type="email" id="rEmail" class="form-control bg-dark border-0 text-white mb-3" placeholder="Email">
                <input type="password" id="rPass" class="form-control bg-dark border-0 text-white mb-3" placeholder="Mật khẩu (6+ kí tự)">
                <button class="btn-main" onclick="doRegister()">TẠO TÀI KHOẢN</button>
                <p class="small mt-3 text-secondary">Đã có nick? <span class="text-info" style="cursor:pointer" onclick="goReg(false)">Quay lại</span></p>
            </div>
        </div>
    </div>

    <div id="mainBox" style="display:none">
        <div class="sidebar">
            <h4 class="fw-bold mb-4">MMO <span style="color:var(--neon-pink)">PRO</span></h4>
            <a class="nav-link-custom active" onclick="showTab('home', this)"><i class="fas fa-home me-2"></i> Sảnh chính</a>
            <a class="nav-link-custom" onclick="showTab('task', this)"><i class="fas fa-play me-2"></i> Làm nhiệm vụ</a>
            <a class="nav-link-custom" onclick="showTab('pay', this)"><i class="fas fa-wallet me-2"></i> Rút tiền</a>
            <hr>
            <a class="nav-link-custom text-danger" onclick="doLogout()"><i class="fas fa-sign-out-alt me-2"></i> Đăng xuất</a>
        </div>

        <div class="mobile-nav">
            <a href="javascript:void(0)" class="m-item active" onclick="showTab('home', this)"><i class="fas fa-home"></i>Sảnh</a>
            <a href="javascript:void(0)" class="m-item" onclick="showTab('task', this)"><i class="fas fa-bolt"></i>Nhiệm vụ</a>
            <a href="javascript:void(0)" class="m-item" onclick="showTab('pay', this)"><i class="fas fa-wallet"></i>Rút tiền</a>
            <a href="javascript:void(0)" class="m-item" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i>Thoát</a>
        </div>

        <div class="content-area">
            <div id="home" class="tab-content active">
                <div class="card-custom text-center">
                    <p class="text-secondary small">SỐ DƯ CỦA BẠN</p>
                    <h2 id="uiBalance" class="fw-bold">0 đ</h2>
                </div>
                <div class="card-custom">
                    <div class="d-flex justify-content-between small">
                        <span>CẤP ĐỘ: <b id="uiLvl">1</b></span>
                        <span id="uiExp">0/100 EXP</span>
                    </div>
                    <div class="lvl-bar-bg"><div id="uiBar" class="lvl-bar-fill"></div></div>
                </div>
                <button class="btn-main" onclick="checkin()">ĐIỂM DANH (+1,000đ)</button>
            </div>

            <div id="task" class="tab-content">
                <div class="card-custom d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-0">Xem quảng cáo Monetag</h6>
                        <small class="text-info">+500đ mỗi lượt</small>
                    </div>
                    <button class="btn btn-sm btn-light fw-bold px-3" onclick="startTask()">BẮT ĐẦU</button>
                </div>
            </div>

            <div id="pay" class="tab-content">
                <div class="card-custom text-center">
                    <h5>Rút tiền về ví</h5>
                    <input type="number" id="pAmt" class="form-control bg-dark border-0 text-white my-3" placeholder="Nhập số tiền (Min 10k)">
                    <button class="btn-main" onclick="withdraw()">XÁC NHẬN RÚT</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---
        let data = JSON.parse(localStorage.getItem('mmo_final_db')) || {
            user: { name: "", email: "admin@gmail.com", pass: "123456", lvl: 1, exp: 0, last: "" },
            balance: 0
        };

        window.onload = () => {
            if(localStorage.getItem('isLogin') === 'true') {
                document.getElementById('authBox').style.display = 'none';
                document.getElementById('mainBox').style.display = 'block';
                refresh();
            }
        };

        function sync() { localStorage.setItem('mmo_final_db', JSON.stringify(data)); }

        // --- AUTH ---
        function goReg(isReg) {
            document.getElementById('loginForm').style.display = isReg ? 'none' : 'block';
            document.getElementById('regForm').style.display = isReg ? 'block' : 'none';
        }

        function doRegister() {
            const n = document.getElementById('rName').value;
            const e = document.getElementById('rEmail').value;
            const p = document.getElementById('rPass').value;
            if(!n || !e || p.length < 6) return Swal.fire("Lỗi", "Vui lòng nhập đủ thông tin!", "error");
            
            data.user = { name: n, email: e, pass: p, lvl: 1, exp: 0, last: "" };
            sync();
            Swal.fire("Xong!", "Đã tạo nick, hãy đăng nhập", "success");
            goReg(false);
        }

        function doLogin() {
            const e = document.getElementById('lEmail').value;
            const p = document.getElementById('lPass').value;
            if(e === data.user.email && p === data.user.pass) {
                localStorage.setItem('isLogin', 'true');
                location.reload();
            } else {
                Swal.fire("Lỗi", "Sai email hoặc mật khẩu!", "error");
            }
        }

        function doLogout() {
            localStorage.setItem('isLogin', 'false');
            location.reload();
        }

        // --- DASHBOARD ---
        function refresh() {
            document.getElementById('uiBalance').innerText = data.balance.toLocaleString() + " đ";
            document.getElementById('uiLvl').innerText = data.user.lvl;
            document.getElementById('uiExp').innerText = data.user.exp + "/100 EXP";
            document.getElementById('uiBar').style.width = data.user.exp + "%";
            sync();
        }

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Sync Menu Active
            document.querySelectorAll('.nav-link-custom, .m-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function checkin() {
            let today = new Date().toDateString();
            if(data.user.last === today) return Swal.fire("Hết lượt", "Mai quay lại nhé!", "warning");
            
            data.user.last = today;
            data.balance += 1000;
            refresh();
            Swal.fire("Thành công", "+1,000đ", "success");
        }

        function startTask() {
            window.open("https://omg10.com/4/10820048", "_blank");
            let sec = 15;
            Swal.fire({
                title: 'VUI LÒNG CHỜ',
                html: `Hệ thống kiểm tra: <b>${sec}s</b>`,
                showConfirmButton: false, allowOutsideClick: false,
                didOpen: () => {
                    const b = Swal.getHtmlContainer().querySelector('b');
                    const timer = setInterval(() => {
                        sec--; b.textContent = sec + "s";
                        if(sec <= 0) {
                            clearInterval(timer);
                            data.balance += 500;
                            data.user.exp += 20;
                            if(data.user.exp >= 100) { data.user.exp = 0; data.user.lvl++; }
                            refresh();
                            Swal.close();
                            confetti({ particleCount: 100, spread: 70 });
                        }
                    }, 1000);
                }
            });
        }

        function withdraw() {
            const val = parseInt(document.getElementById('pAmt').value);
            if(!val || val < 10000) return Swal.fire("Lỗi", "Rút ít nhất 10k", "error");
            if(val > data.balance) return Swal.fire("Lỗi", "Số dư không đủ", "error");
            
            data.balance -= val;
            refresh();
            Swal.fire("Đã gửi!", "Yêu cầu rút tiền đang chờ duyệt", "success");
        }
    </script>
</body>
</html>
